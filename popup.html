<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 280px;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header svg {
      flex-shrink: 0;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      color: #fff;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 24px;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider {
      background: #4ecca3;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(20px);
    }

    .hint {
      font-size: 11px;
      color: #888;
      line-height: 1.5;
      text-align: center;
    }

    .status {
      text-align: center;
      font-size: 12px;
      margin-bottom: 10px;
      padding: 6px;
      border-radius: 6px;
      font-weight: 500;
    }

    .status.on {
      background: rgba(78, 204, 163, 0.15);
      color: #4ecca3;
    }

    .status.off {
      background: rgba(255, 107, 107, 0.15);
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4ecca3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
    <h1>WyScout Spoiler Blocker</h1>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Hide Scores</span>
    <label class="toggle">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="status on" id="status">Scores are hidden</div>

  <p class="hint">Double-click a match row to reveal its score individually.</p>

  <script src="popup.js"></script>
</body>
</html>
