name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Build zip
        run: |
          zip -r wyscout-spoiler-blocker.zip \
            manifest.json \
            content.css \
            content.js \
            popup.html \
            popup.js \
            icons/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: wyscout-spoiler-blocker.zip
          generate_release_notes: true
